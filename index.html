<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pal Breeding Log</title>
<style>
  :root {
    --bg: #16181c;
    --panel: #1f2228;
    --panel-alt: #262a32;
    --border: #333844;
    --text: #e7e9ee;
    --text-dim: #9aa1ad;
    --accent: #6fb98f;
    --accent-dim: #3f6e56;
    --danger: #c96a5a;
    --font-display: Georgia, 'Times New Roman', serif;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    padding: 24px 16px 64px;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  header { margin-bottom: 28px; }
  h1 {
    font-family: var(--font-display);
    font-weight: 400;
    font-size: 2rem;
    margin: 0 0 4px;
    letter-spacing: 0.3px;
  }
  .subtitle { color: var(--text-dim); font-size: 0.95rem; margin: 0; }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .panel h2 {
    font-family: var(--font-display);
    font-weight: 400;
    font-size: 1.15rem;
    margin: 0 0 14px;
    color: var(--text);
  }

  form { display: grid; gap: 12px; }
  .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  @media (max-width: 620px) { .row3 { grid-template-columns: 1fr; } }

  label { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-dim); display: block; margin-bottom: 4px; }
  input, select {
    width: 100%;
    background: var(--panel-alt);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 10px;
    border-radius: 6px;
    font-size: 0.95rem;
    font-family: inherit;
  }
  input:focus, select:focus { outline: none; border-color: var(--accent-dim); }

  button {
    font-family: inherit;
    font-size: 0.9rem;
    cursor: pointer;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--panel-alt);
    color: var(--text);
    padding: 9px 14px;
  }
  button:hover { border-color: var(--accent-dim); }
  .btn-primary {
    background: var(--accent-dim);
    border-color: var(--accent-dim);
    color: #eafff2;
  }
  .btn-primary:hover { background: var(--accent); border-color: var(--accent); color: #10241a; }
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
  .btn-small { font-size: 0.8rem; padding: 6px 10px; }

  .search-bar { margin-bottom: 14px; }

  table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
  th, td { text-align: left; padding: 8px 6px; border-bottom: 1px solid var(--border); }
  th { color: var(--text-dim); font-weight: 500; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
  td.pair { white-space: nowrap; }
  .arrow { color: var(--text-dim); margin: 0 6px; }
  .empty-state { color: var(--text-dim); font-size: 0.9rem; padding: 20px 0; text-align: center; }
  .del-btn { color: var(--danger); background: none; border: none; cursor: pointer; font-size: 1rem; padding: 2px 6px; }
  .del-btn:hover { text-decoration: underline; }
  .count-badge { color: var(--text-dim); font-size: 0.8rem; }
  .notes-cell { color: var(--text-dim); font-size: 0.85rem; }
  .footer-note { color: var(--text-dim); font-size: 0.8rem; text-align: center; margin-top: 28px; }
  .footer-note a { color: var(--accent); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Pal Breeding Log</h1>
    <p class="subtitle">Your own discovery log — nothing here is looked up, only what you've bred yourself.</p>
  </header>

  <div class="panel">
    <h2>Log a breed</h2>
    <form id="logForm">
      <div class="row3">
        <div>
          <label for="parentA">Parent A</label>
          <input list="palList" id="parentA" placeholder="Type or pick a Pal" required>
        </div>
        <div>
          <label for="parentB">Parent B</label>
          <input list="palList" id="parentB" placeholder="Type or pick a Pal" required>
        </div>
        <div>
          <label for="child">Result</label>
          <input list="palList" id="child" placeholder="What hatched?" required>
        </div>
      </div>
      <div>
        <label for="notes">Notes (optional)</label>
        <input id="notes" placeholder="e.g. took 2 tries, egg was Large size">
      </div>
      <div class="btn-row">
        <button type="submit" class="btn-primary">Add to log</button>
      </div>
    </form>
  </div>

  <div class="panel">
    <h2>Your discoveries <span class="count-badge" id="countBadge"></span></h2>
    <div class="search-bar">
      <input id="searchBox" placeholder="Filter your log by Pal name…">
    </div>
    <div id="tableWrap"></div>
    <div class="btn-row">
      <button id="exportBtn" class="btn-small">Export backup (.json)</button>
      <button id="importBtn" class="btn-small">Import backup</button>
      <input type="file" id="importFile" accept="application/json" style="display:none">
    </div>
  </div>

  <p class="footer-note">Data is stored only in this browser (localStorage). Export a backup if you play from more than one device or browser.</p>
</div>

<datalist id="palList"></datalist>

<script>
// Pal names only (Palworld 1.0, 288 entries) — used purely to populate the dropdown.
// No breeding pairings or outcomes are included anywhere in this app.
const PALS = [
"Lamball","Cattiva","Chikipi","Vixy","Cremis","Melpaca","Kingpaca","Killamari Primo","Eikthyrdeer","Direhowl","Woolipop","Mozzarina","Ribbuny","Galeclaw","Nitewing","Tocotoco","Grintale","Gorirat","Lunaris","Fenglope","Sibelyx Primo","Yakumo","Starryon Primo","Tetroise Primo","Mimog","Dogen","Celesdir","Valentail","Lapure","Hartalis","Paladius","Astralym",
"Tanzee Ignis","Flambelle","Rooby","Foxparks","Kelpsea Ignis","Gobfin Ignis","Arsox","Vanwyrm","Leezpunk Ignis","Wixen","Wixen Noct","Bushi","Bushi Noct","Incineram","Pyrin","Pyrin Noct","Ghangler Ignis","Chillet Ignis","Ragnahawk","Moldron","Kitsun","Blazehowl","Blazehowl Noct","Suzaku","Reptyro","Blazamut","Knocklem Ignis","Flaracle","Dupin","Renjishi","Faleris",
"Fuack","Fuack Ignis","Celaray","Celaray Lux","Croajiro","Croajiro Noct","Teafant","Pengullet","Pengullet Lux","Penking","Penking Lux","Turtacle","Turtacle Terra","Azurobe","Kelpsea","Jelliette","Jellroy","Amione","Gloopie","Gloopie Primo","Gobfin","Surfent","Finsider","Finsider Ignis","Suzaku Aqua","Skutlass","Skutlass Ignis","Solmora","Solmora Lux","Faleris Aqua","Neptilius","Panthalus",
"Lifmunk","Herbil","Gumoss","Clovee","Tanzee","Caprity","Ribbuny Botan","Bristla","Cinnamoth","Vaelet","Beegarde","Elizabee","Robinquill","Robinquill Terra","Flopie","Elgrove","Dinossom","Mammorest","Petallia","Petallia Ignis","Leafan","Needoll","Mossanda","Palumba","Broncherry","Broncherry Aqua","Braloha","Shroomer","Shroomer Noct","Lullu","Wumpo Botan","Carnibora","Prunelia","Nitemary Botan","Verdash","Souffline","Tropicaw","Ophydia","Mycora","Lyleen","Silvance","Dandilord",
"Jolthog","Sparkit","Univolt","Puffolt","Fenglope Lux","Dinossom Lux","Dazzi","Beakon","Rayhound","Mossanda Lux","Prixter Lux","Azurmane","Snock","Snock Lux","Slowatt","Dynamoff","Grizzbolt",
"Jolthog Cryst","Kingpaca Cryst","Mau Cryst","Foxparks Cryst","Swee","Sweepa","Hangyu Cryst","Azurobe Cryst","Univolt Cryst","Loupmoon Cryst","Muffly","Vanwyrm Cryst","Polapup","Polapup Terra","Elgrove Cryst","Munchill","Mammorest Cryst","Foxcicle","Beakon Cryst","Rayhound Cryst","Reindrix","Chillet","Moldron Cryst","Frostplume","Sibelyx","Icelyn","Reptyro Cryst","Pierdon Cryst","Cryolinx","Snugloo","Wumpo","Whalaska","Whalaska Ignis","Bastigor","Frostallion",
"Pupperai","Rushoar","Fuddler","Eikthyrdeer Terra","Hangyu","Woolipop Terra","Gorirat Terra","Surfent Terra","Menasting Terra","Digtoise","Dumud","Dumud Gild","Warsect","Warsect Terra","Dazemu","Kikit","Pierdon","Cryolinx Terra","Dualith","Dualith Noct","Anubis","Sekhmet","Tetroise","Gildane","Bulldosu","Knocklem","Lapiron",
"Depresso","Hoocrates","Daedream","Nox","Mau","Killamari","Caprity Noct","Wispaw","Tombat","Loupmoon","Cawgnito","Felbat","Lovander","Tarantriss","Leezpunk","Katress","Katress Ignis","Helzephyr","Helzephyr Lux","Incineram Noct","Dazzi Noct","Ghangler","Menasting","Needoll Noct","Kitsun Noct","Majex","Maraith","Gildra","Starryon","Sootseer","Prixter","Nyafia","Xenovader","Nitemary","Smokie","Smokie Cryst","Omascul","Splatterina","Celesdir Noct","Hoodle","Bakemi","Roujay","Venusa","Loomen","Wistella","Solenne","Lyleen Noct","Shadowbeak","Selyne","Bellanoir","Bellanoir Libero","Xenolord","Necromus","Frostallion Noct",
"Elphidran","Elphidran Aqua","Relaxaurus","Relaxaurus Lux","Jormuntide","Jormuntide Ignis","Quivern","Quivern Botan","Blazamut Ryu","Xenogard","Astegon","Silvegis","Eidrolon","Eidrolon Ignis","Aegidron","Orserk","Shaolong","Jetragon"
];

const STORAGE_KEY = 'palBreedingLog';

function loadEntries() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch (e) {
    console.error('Could not read saved log', e);
    return [];
  }
}

function saveEntries(entries) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
}

let entries = loadEntries();

// Populate the datalist for dropdown/autocomplete
const datalist = document.getElementById('palList');
datalist.innerHTML = PALS.map(p => `<option value="${p}"></option>`).join('');

const form = document.getElementById('logForm');
const tableWrap = document.getElementById('tableWrap');
const countBadge = document.getElementById('countBadge');
const searchBox = document.getElementById('searchBox');

function render(filter) {
  const f = (filter || '').trim().toLowerCase();
  const shown = f
    ? entries.filter(e =>
        e.parentA.toLowerCase().includes(f) ||
        e.parentB.toLowerCase().includes(f) ||
        e.child.toLowerCase().includes(f))
    : entries;

  countBadge.textContent = entries.length ? `(${entries.length} logged)` : '';

  if (!shown.length) {
    tableWrap.innerHTML = `<div class="empty-state">${entries.length ? 'No matches.' : 'Nothing logged yet — breed something and add it above.'}</div>`;
    return;
  }

  const rows = shown
    .slice()
    .reverse()
    .map(e => `
      <tr data-id="${e.id}">
        <td class="pair">${escapeHtml(e.parentA)} <span class="arrow">×</span> ${escapeHtml(e.parentB)}</td>
        <td>${escapeHtml(e.child)}</td>
        <td class="notes-cell">${escapeHtml(e.notes || '')}</td>
        <td>${e.date}</td>
        <td><button class="del-btn" data-id="${e.id}" title="Delete entry">✕</button></td>
      </tr>
    `).join('');

  tableWrap.innerHTML = `
    <table>
      <thead><tr><th>Parents</th><th>Result</th><th>Notes</th><th>Logged</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  `;

  tableWrap.querySelectorAll('.del-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.getAttribute('data-id');
      entries = entries.filter(e => e.id !== id);
      saveEntries(entries);
      render(searchBox.value);
    });
  });
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

form.addEventListener('submit', (ev) => {
  ev.preventDefault();
  const parentA = document.getElementById('parentA').value.trim();
  const parentB = document.getElementById('parentB').value.trim();
  const child = document.getElementById('child').value.trim();
  const notes = document.getElementById('notes').value.trim();
  if (!parentA || !parentB || !child) return;

  entries.push({
    id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
    parentA, parentB, child, notes,
    date: new Date().toISOString().slice(0, 10)
  });
  saveEntries(entries);
  form.reset();
  render(searchBox.value);
  document.getElementById('parentA').focus();
});

searchBox.addEventListener('input', () => render(searchBox.value));

document.getElementById('exportBtn').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify(entries, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `pal-breeding-log-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
});

document.getElementById('importBtn').addEventListener('click', () => {
  document.getElementById('importFile').click();
});

document.getElementById('importFile').addEventListener('change', (ev) => {
  const file = ev.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const imported = JSON.parse(reader.result);
      if (!Array.isArray(imported)) throw new Error('Not a valid backup file');
      // Merge, avoiding duplicate ids
      const existingIds = new Set(entries.map(e => e.id));
      const merged = entries.concat(imported.filter(e => e && e.id && !existingIds.has(e.id)));
      entries = merged;
      saveEntries(entries);
      render(searchBox.value);
      alert(`Imported. Log now has ${entries.length} entries.`);
    } catch (e) {
      alert('That file could not be read as a breeding log backup.');
    }
  };
  reader.readAsText(file);
  ev.target.value = '';
});

render();
</script>
</body>
</html>
